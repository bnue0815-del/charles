<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한국의 세계문화유산 & 세계기록유산 디지털 전시관</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght=300;400;500;700&family=Song+Myung&display=swap');

        :root {
            --navy-dark: #0a1128;
            --navy-medium: #1c2541;
            --navy-light: #3a506b;
            --amber-gold: #d97706;
            --text-light: #f8fafc;
            --card-bg: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; min-height: 100vh; font-family: 'Noto Sans KR', sans-serif; background-color: var(--navy-dark); color: var(--text-light); overflow-x: hidden; }

        /* 메인 비주얼 헤더 */
        header {
            background: linear-gradient(rgba(10, 17, 40, 0.85), rgba(10, 17, 40, 0.95)), url('https://images.unsplash.com/photo-1548013146-72479768bada?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
            padding: 60px 20px; text-align: center; border-bottom: 5px solid var(--amber-gold);
        }
        header h1 { font-family: 'Song Myung', serif; font-size: 3rem; color: #fbbf24; margin-bottom: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        header p { font-size: 1.1rem; color: #cbd5e1; max-width: 800px; margin: 0 auto; line-height: 1.6; font-weight: 300; }

        /* 탭 내비게이션 */
        .tab-container { display: flex; justify-content: center; gap: 15px; margin: 40px 0 20px; }
        .tab-btn {
            background-color: var(--navy-medium); color: #94a3b8; border: 2px solid var(--navy-light);
            padding: 14px 35px; font-size: 1.1rem; font-weight: 500; border-radius: 30px; cursor: pointer;
            transition: all 0.3s ease; font-family: 'Noto Sans KR', sans-serif;
        }
        .tab-btn:hover { background-color: var(--navy-light); color: var(--text-light); }
        .tab-btn.active { background-color: var(--amber-gold); color: white; border-color: var(--amber-gold); box-shadow: 0 4px 14px rgba(217, 119, 6, 0.4); }

        /* 뷰 스위칭 섹션 */
        .view-section { display: none; max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }
        .view-section.active { display: block; animation: fadeIn 0.5s ease-in-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 전시 그리드 시스템 */
        .heritage-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 30px; }
        .heritage-thumb-card {
            background-color: var(--card-bg); border-radius: 16px; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); cursor: pointer; transition: all 0.3s ease;
            display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05);
        }
        .heritage-thumb-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(217, 119, 6, 0.2); }
        
        .thumb-img-area { width: 100%; height: 220px; background-color: #1e293b; overflow: hidden; position: relative; }
        .thumb-img-area img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .heritage-thumb-card:hover .thumb-img-area img { transform: scale(1.05); }

        .thumb-info-area { padding: 22px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; background: linear-gradient(to bottom, #ffffff, #f8fafc); }
        .thumb-info-area h3 { font-family: 'Song Myung', serif; font-size: 1.35rem; color: #0f172a; margin-bottom: 8px; line-height: 1.4; }

        /* 세계기록유산관 하단 추가 안내 구역 스타일 */
        .record-footer-notice {
            margin-top: 50px; padding: 35px 25px; background: var(--navy-medium);
            border-radius: 16px; border-left: 5px solid var(--amber-gold); text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .record-footer-notice p { font-size: 1.1rem; line-height: 1.7; color: #e2e8f0; margin-bottom: 12px; }
        .record-footer-notice .sub-p { font-size: 1.15rem; font-weight: 500; color: #fbbf24; margin-bottom: 22px; }
        .more-link-btn {
            display: inline-block; background: var(--amber-gold); color: white; font-weight: bold;
            text-decoration: none; padding: 12px 30px; border-radius: 25px; font-size: 1rem;
            transition: background 0.3s, transform 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .more-link-btn:hover { background: #b45309; transform: scale(1.02); }

        /* 오버레이 상세 모달창 디자인 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(5px); z-index: 2000; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 20px;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-window {
            background-color: #ffffff; width: 100%; max-width: 900px; max-height: 90vh;
            border-radius: 24px; overflow-y: auto; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative; transform: scale(0.9); transition: transform 0.3s ease; color: #334155;
            border: 4px solid var(--amber-gold);
        }
        .modal-overlay.active .modal-window { transform: scale(1); }

        .modal-close-btn {
            position: absolute; top: 20px; right: 20px; background-color: rgba(15, 23, 42, 0.6);
            color: white; border: none; width: 40px; height: 40px; border-radius: 50%;
            font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            z-index: 10; transition: background 0.2s;
        }
        .modal-close-btn:hover { background-color: var(--amber-gold); }

        .modal-hero-img { width: 100%; height: 380px; background-color: #0f172a; position: relative; }
        .modal-hero-img img { width: 100%; height: 100%; object-fit: cover; }

        .modal-content-frame { padding: 40px; }
        .modal-title-row { border-bottom: 2px solid #e2e8f0; padding-bottom: 20px; margin-bottom: 25px; }
        .modal-title-row h2 { font-family: 'Song Myung', serif; font-size: 2.3rem; color: #0f172a; margin-bottom: 10px; }
        .modal-badge { display: inline-block; background-color: #fef3c7; color: #d97706; padding: 6px 16px; border-radius: 20px; font-size: 0.95rem; font-weight: 600; }

        .content-block { line-height: 1.8; font-size: 1.1rem; color: #334155; text-align: justify; }

        /* 반응형 모바일 축소 가이드 */
        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .modal-hero-img { height: 240px; }
            .modal-content-frame { padding: 25px; }
            .modal-title-row h2 { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>🏛️ 한국의 유네스코 세계유산 디지털 전시관</h1>
        <p>우리 조상들이 물려주신 위대한 세계문화유산과 세계기록유산을 탐색해 봅시다.</p>
    </header>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('culture')">🏯 세계문화유산 (15종)</button>
        <button class="tab-btn" onclick="switchTab('record')">📜 세계기록유산 (15종)</button>
    </div>

    <section id="culture-view" class="view-section active">
        <div class="heritage-grid" id="culture-grid"></div>
    </section>

    <section id="record-view" class="view-section">
        <div class="heritage-grid" id="record-grid"></div>
        
        <div class="record-footer-notice">
            <p>우리나라에는 위의 유산들 외에도 <strong>1980년 인권기록유산 5.18 광주 민주화운동 기록물 (2011년), 새마을운동기록물 (2013년), KBS특별생방송 '이산가족을 찾습니다' 기록물 (2015년), 4.19혁명기록물 (2023년), 제주4·3기록물 (2025년)</strong>도 있습니다.</p>
            <p class="sub-p">5가지 세계기록유산에 대해서도 알아보세요.</p>
            <a href="https://www.heritage.go.kr/heri/html/HtmlPage.do?pg=/unesco/korWorldMemHeritage.jsp&pageNo=4_4_2_0" target="_blank" class="more-link-btn">한국의 세계기록유산 더 알아보기</a>
        </div>
    </section>

    <div class="modal-overlay" id="detailModal" onclick="closeModalOnOverlay(event)">
        <div class="modal-window">
            <button class="modal-close-btn" onclick="closeModal()">&times;</button>
            <div class="modal-hero-img">
                <img id="modalImg" src="" alt="유산 이미지">
            </div>
            <div class="modal-content-frame">
                <div class="modal-title-row">
                    <h2 id="modalTitle">유산 이름</h2>
                    <span class="modal-badge" id="modalYear">등재 연도</span>
                </div>
                <div class="content-block" id="modalText">
                    상세 본문 텍스트가 표시됩니다.
                </div>
            </div>
        </div>
    </div>

    <script>
        // 세계문화유산 15개 데이터 (summary 제외 및 디테일 텍스트 대폭 확장)
        const cultureHeritages = [
            {
                name: "석굴암과 불국사",
                img: "1.png",
                year: "1995년 등재",
                text: "통일신라 경덕왕 시절인 751년, 재상 김대성이 현생의 부모를 위해 화려한 불국사를 창건하고 전생의 부모를 위해 신비로운 석굴암을 축조하기 시작하여 774년 완공한 신라 불교 예술의 최고 정수입니다. 불국사는 청운교와 백운교, 연화교와 칠보교라는 돌계단 다리를 거쳐 부처님의 세계인 극락정토와 대웅전으로 진입하는 정교한 사찰 동선 구조를 가지고 있습니다. 대웅전 앞마당에 나란히 선 석가탑과 다보탑은 각각 절제된 단순미와 극도의 화려함이라는 상반된 조형 감각을 완벽한 비례로 융합해 냈습니다. 토함산 동쪽에 위치한 석굴암은 거친 화강암을 깎아 정교하게 결구한 세계 유일의 인공 석굴 사원입니다. 본존불을 중심으로 사천왕상, 인왕상, 십대제자상 등이 돔 형태의 공간 내에 배치되어 있으며, 해부학적 사실성과 종교적 숭고함을 동시에 뿜어냅니다. 특히 석굴암은 내부 결로와 이끼 발생을 막기 위해 바닥 아래로 차가운 지하수를 흐르게 하여 내부 습기를 아래로 끌어내리고, 감단석 사이의 틈새로 자연 환기가 이루어지도록 설계한 고대 신라의 독보적인 공학적 지혜가 응집된 유산입니다."
            },
            {
                name: "해인사 장경판전",
                img: "2.png",
                year: "1995년 등재",
                text: "13세기 고려 왕조가 판각한 고려대장경판(팔만대장경)을 안전하게 영구 보존하기 위해 15세기 조선 초기에 건립된 세계 유일의 대장경 보관 전용 건축물입니다. 가야산 해인사의 가장 높은 서쪽 자락에 위치한 장경판전은 수다라장과 법보전이라는 두 동의 긴 건물이 남북으로 마주 보고 있습니다. 이 건축물의 위대한 점은 현대식 기계 장치에 전혀 의존하지 않고, 오직 기후와 지형의 특성을 간파한 건축 구조학적 원리만으로 목판의 변형을 막는다는 것입니다. 전면과 후면 창문의 크기를 위아래로 다르게 설계하여, 가야산 계곡에서 불어오는 바람이 건물 내부를 한 바퀴 돌아 자연스럽게 대류하도록 유도했습니다. 또한 전각 바닥 내부를 깊게 파내고 숯, 횟가루, 소금, 모래를 켜켜이 묻어 장마철에는 공기 중의 과도한 습기를 흡수하고, 가뭄과 겨울철에는 머금고 있던 수분을 밖으로 방출하는 천연 항온항습 장치 역할을 수행하게 했습니다. 이 과학적 설계 덕분에 8만여 장의 목판이 600년이 넘는 세월 동안 단 한 장도 뒤틀리거나 썩지 않고 완벽한 원형으로 보존될 수 있었습니다."
            },
            {
                name: "종묘",
                img: "3.png",
                year: "1995년 등재",
                text: "조선 왕조의 역대 왕과 왕비, 그리고 사후에 국가적으로 큰 공덕을 인정받은 공신들의 신주(위패)를 모시고 제사를 지내는 유교 사당입니다. 동양의 전통 건축에서는 매우 보기 드물게 가로로 길게 늘어선 독특하고 장엄한 구조의 정전과 영녕전 건물로 이루어져 있습니다. 화려한 단청이나 복잡한 장식을 극도로 배제하고, 붉은 기둥과 단순한 지붕선의 무한한 반복, 그리고 전면에 깔린 넓고 거친 돌마당(월대)을 통해 특유의 정제되고 엄숙한 신성미와 영혼의 공간을 자아냅니다. 유형적인 사당 건축물의 아름다움과 함께, 500년 전 조선 시대의 국가 최고 의례였던 '종묘제례'와 이에 맞춰 연주되는 기악, 노래, 무용인 '종묘제례악'이 오늘날까지 단절되지 않고 원형 그대로 재현 및 전승되고 있습니다. 이처럼 무형의 의례 문화와 유형의 건축 공간이 한자리에서 결합하여 수백 년간 이어져 내려오는 사례는 전 세계적으로 매우 독보적이며 인류 문화사적 가치가 최상위에 달하는 유산입니다."
            },
            {
                name: "창덕궁",
                img: "4.png",
                year: "1997년 등재",
                text: "조선 태종 때인 1405년 건립된 별궁으로, 임진왜란 당시 경복궁을 비롯한 모든 궁궐이 소실되자 선조와 광해군 대에 최우선으로 중건되어 고종 대에 경복궁이 재건될 때까지 약 270년 동안 조선의 실질적인 정궁이자 법궁 역할을 수행했던 곳입니다. 인위적으로 주변 산을 깎고 강력한 좌우 대칭축을 맞추어 군주의 권위를 물리적으로 강조한 서양이나 중국의 궁궐들과 달리, 북한산 응봉 자락의 험준한 산세와 구릉 지형을 그대로 살려 전각들을 자연스럽게 흩어 배치한 가장 한국적인 궁궐 구조를 자랑합니다. 공식 집무 공간인 인정전과 선정전을 지나 내부로 들어서면 왕의 휴식 공간이자 한국 전통 조경 예술의 정수인 '후원(비원)'이 펼쳐집니다. 숲속 골짜기에 스며들듯 조성된 부용지, 애련지 등의 연못과 자연석을 다듬어 만든 정자들은 자연을 거스르지 않고 원래 있던 환경 속에 온전히 스며들도록 배치되어 동아시아 궁궐 건축의 정형을 보여줍니다."
            },
            {
                name: "수원 화성",
                img: "5.png",
                year: "1997년 등재",
                text: "조선 후기 정조대왕이 자신의 비극적인 아버지 사도세자의 묘를 명당인 수원 화산으로 옮기면서, 강력한 국방 요새이자 자급자족이 가능한 상업 거점 개혁 도시를 육성하기 위해 축성한 계획 성곽 도시입니다. 당대 최고의 실학자 정약용이 동양 전통의 축성 기법에 더해 서양의 성곽 설계 가이이드북인 '기하기고'와 중국 문물을 참고하여 동서양 공학 기술을 완벽하게 융합 설계하였습니다. 성벽에 돌뿐만 아니라 불에 구운 벽돌(전돌)을 혼용하여 대포 포격의 충격을 흡수하도록 만들었고, 거중기와 녹로 같은 신형 복합 도르래 기계를 독창적으로 발명·도입하여 백성들의 노동력을 획기적으로 아끼고 공사 기간을 단축했습니다. 군사적 방어 기능과 백성들이 삶을 영위하는 평지 성곽 기능을 결합한 근대식 성곽의 최고봉으로 평가받으며, 전체 축성 과정을 소요 예산부터 장인들의 이름, 하사품까지 정밀하게 기록한 '화성성역의궤'가 존재하여 유산의 보존 및 복원의 정확성을 세계적으로 인정받았습니다."
            },
            {
                name: "경주역사유적지구",

                text: "1894년 부패한 탐관오리를 처벌하고 노비 문서 소각 등 백성이 평등한 세상을 만들고자 일어난 동학농민군 측의 선언서(무장포고문), 격문, 사발통문, 농민들의 일기 및 민간 기록과, 이를 무력으로 진압하려 한 조선 정부 관군, 군공 세력, 그리고 일본군의 작전 보고서 및 심문 조서 등을 아우르는 복합 기록물입니다. 왕조나 국가 지배층 중심의 시각에서 서술된 일방적 역사 기록에서 과감히 벗어나, 억압받던 피지배층인 민중들이 역사의 주체로 등장하여 부당한 권력의 청산과 인간의 존엄성, 신분제 타파, 자주국방을 부르짖었던 민주주의 초기 역사의 에너지를 날것 그대로 입증하는 위대한 근대 민중 기록 자산입니다."
            },
            {
                name: "산림녹화기록물",
                img: "30.png",
                year: "2023년 등재",
                text: "일제강점기의 무분별한 벌채와 6·25 전쟁의 참혹한 포화로 인해 전 세계에서 가장 국토 황폐화가 심각했던 대한민국의 민무늬 산들을 온 국민과 행정부가 합심하여 불과 수십 년 만에 울창하고 푸른 숲으로 가꾸어낸 기적적인 산림 복구 과정의 정부 및 민간 공식 기록물입니다. 산림청의 치산녹화 10개년 계획서, 과학적 조림 지침서, 사방공사 도면, 그리고 산을 가꾸기 위해 매년 나무를 심고 가꾸었던 전국의 시골 마을 주민들과 영농조합의 자발적인 협동 저널 및 사진 기록 등이 망라되어 있습니다. 제2차 세계대전 이후 전 세계 개발도상국 가운데 경제 성장(공업화)과 환경 보존(국토 산림 복원)을 동시에 완벽하게 대성공한 유일무이한 세계적 모범 사례를 행정 및 공동체 아카이브로서 명확하게 입증하고 있습니다."
            }
        ];

        // 초기 화면 설정 및 데이터 주입 렌더링
        window.onload = function() {
            renderGrid(cultureHeritages, "culture-grid");
            renderGrid(documentaryHeritages, "record-grid");
        };

        // 데이터 동적 카드 배치 시스템
        function renderGrid(heritages, targetId) {
            const grid = document.getElementById(targetId);
            grid.innerHTML = "";
            heritages.forEach(h => {
                const card = document.createElement('div');
                card.className = 'heritage-thumb-card';
                card.onclick = () => openModal(h);
                card.innerHTML = `
                    <div class="thumb-img-area">
                        <img src="${h.img}" alt="${h.name}" onerror="this.src='https://images.unsplash.com/photo-1506880018603-83d5b814b5a6?auto=format&fit=crop&w=500&q=80'">
                    </div>
                    <div class="thumb-info-area">
                        <h3>${h.name}</h3>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 상단 탭 대전환 컨트롤러
        function switchTab(type) {
            const btns = document.querySelectorAll('.tab-btn');
            const cultureView = document.getElementById('culture-view');
            const recordView = document.getElementById('record-view');

            if (type === 'culture') {
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
                cultureView.classList.add('active');
                recordView.classList.remove('active');
            } else {
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
                cultureView.classList.remove('active');
                recordView.classList.add('active');
            }
        }

        // 모달창 열기
        function openModal(data) {
            document.getElementById('modalTitle').innerText = data.name;
            document.getElementById('modalYear').innerText = "유네스코 지정 세계유산 : " + data.year;
            document.getElementById('modalText').innerText = data.text;
            
            const mImg = document.getElementById('modalImg');
            mImg.src = data.img;
            mImg.onerror = function() {
                this.src = data.img.includes('16') || parseInt(data.img) >= 16 
                    ? 'https://images.unsplash.com/photo-1506880018603-83d5b814b5a6?auto=format&fit=crop&w=900&q=80' 
                    : 'https://images.unsplash.com/photo-1548013146-72479768bada?auto=format&fit=crop&w=900&q=80';
            };

            document.getElementById('detailModal').classList.add('active');
        }

        // 모달창 닫기
        function closeModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // 바깥 어두운 배경 클릭 시 닫기
        function closeModalOnOverlay(e) {
            if (e.target === document.getElementById('detailModal')) {
                closeModal();
            }
        }
    </script>
</body>
</html>
